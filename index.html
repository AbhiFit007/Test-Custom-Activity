<!DOCTYPE html>
<html>
<head>
  <title>Custom Activity</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/postmonger/0.0.16/postmonger.min.js"></script>
</head>
<body>
  <h3>Custom Activity Loaded</h3>

  <script>
    var connection = new Postmonger.Session();

    connection.trigger('ready');

    connection.on('initActivity', function(data) {
      console.log('initActivity', data);
    });

    connection.on('requestedTokens', function(tokens) {
      console.log(tokens);
    });

    connection.on('clickedNext', function() {
      connection.trigger('updateActivity', {});
    });

    connection.on('clickedBack', function() {
      connection.trigger('prevStep');
    });

    connection.on('clickedCancel', function() {
      connection.trigger('destroy');
    });
  </script>
</body>
</html>
